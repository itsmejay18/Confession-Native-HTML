<!DOCTYPE html>
<html lang="ceb">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confession para Nimo</title>
  <meta
    name="description"
    content="Usa ka romantic ug mobile-first nga Bisaya confession website nga adunay smooth nga step-by-step reveal."
  >
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="page-bg" aria-hidden="true">
    <div class="page-bg__stars"></div>
    <div class="page-bg__glow page-bg__glow--left"></div>
    <div class="page-bg__glow page-bg__glow--right"></div>
    <div class="floating-hearts">
      <span style="--left: 7%; --delay: 0s; --duration: 14s;">&#10084;</span>
      <span style="--left: 21%; --delay: 3s; --duration: 16s;">&#10084;</span>
      <span style="--left: 39%; --delay: 6s; --duration: 15s;">&#10084;</span>
      <span style="--left: 58%; --delay: 1.5s; --duration: 17s;">&#10084;</span>
      <span style="--left: 77%; --delay: 4.5s; --duration: 14s;">&#10084;</span>
      <span style="--left: 92%; --delay: 2s; --duration: 18s;">&#10084;</span>
    </div>
  </div>

  <button
    class="secret-trigger"
    id="secretTrigger"
    type="button"
    aria-label="Open the secret code modal"
    title="Naay sikreto diri"
  >
    &#9825;
  </button>

  <button class="music-toggle" id="musicToggle" type="button" aria-pressed="false">
    Play Music
  </button>

  <audio id="backgroundMusic" preload="auto" loop playsinline>
    <source src="assets/basin-puhon.mp3" type="audio/mpeg">
  </audio>

  <main class="hero">
    <section class="story-card reveal" aria-labelledby="mainTitle">
      <p class="story-card__eyebrow">Para sa usa ka espesyal nga tawo</p>
      <h1 class="story-card__title" id="mainTitle">
        Hey... naa koy gustong isulti &#128064;
      </h1>
      <p class="story-card__subtitle">
        Hinay-hinay lang. Usa-usa ni nga mugawas gikan sa akong kasingkasing.
      </p>

      <div class="progress" aria-label="Confession progress">
        <span class="progress__dot" data-dot="0"></span>
        <span class="progress__dot" data-dot="1"></span>
        <span class="progress__dot" data-dot="2"></span>
        <span class="progress__dot" data-dot="3"></span>
      </div>

      <section class="story-panel" id="storyPanel" hidden aria-live="polite">
        <p class="story-panel__step" id="storyStep">Step 1 of 4</p>
        <p class="story-panel__text" id="storyText"></p>
      </section>

      <div class="story-card__actions">
        <button class="primary-button" id="confessionButton" type="button">Click me</button>
      </div>
    </section>
  </main>

  <div class="heart-burst" id="heartBurst" aria-hidden="true"></div>

  <div class="modal" id="secretModal" hidden>
    <div class="modal__backdrop" data-close-modal="true"></div>

    <div
      class="modal__dialog"
      role="dialog"
      aria-modal="true"
      aria-labelledby="secretTitle"
      aria-describedby="secretDescription"
    >
      <button class="modal__close" id="modalClose" type="button" aria-label="Close modal">
        &times;
      </button>

      <p class="modal__eyebrow">Tinagong mensahe</p>
      <h2 class="modal__title" id="secretTitle">Enter secret code</h2>
      <p class="modal__description" id="secretDescription">
        Kung kabalo ka sa code, naa pay usa ka mensahe nga gitago para nimo.
      </p>

      <form class="modal__form" id="secretForm">
        <label class="sr-only" for="secretInput">Enter secret code</label>
        <input
          class="modal__input"
          id="secretInput"
          name="secret"
          type="password"
          inputmode="text"
          autocomplete="off"
          placeholder="Ibutang ang code"
          required
        >
        <button class="secondary-button" type="submit">Open</button>
      </form>

      <p class="modal__feedback" id="secretFeedback" aria-live="polite"></p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
